{% extends 'base.html' %}
{% block title %}Sign Up - EventQR{% endblock %}
{% block body_class %}default-bg{% endblock %}

{% block content %}
<div class="container auth-container">
    <div class="splash-logo" style="margin: 0 auto 20px auto; width: 70px; height: 70px; font-size: 2em; box-shadow: 0 0 15px rgba(46, 213, 115, 0.4);">
        <i class="fas fa-user-plus" style="color: var(--secondary-green);"></i>
    </div>

    <h1 style="margin-bottom: 5px;">Create Account</h1>
    <p style="margin-bottom: 25px;">Join EventQR to start generating codes.</p>
    
    <form method="POST" action="{{ url_for('signup') }}" style="width: 100%;">
        <div class="form-group">
            <label for="username"><i class="fas fa-user"></i> Username</label>
            <input type="text" id="username" name="username" required placeholder="Choose a username">
        </div>
        
        <div class="form-group">
            <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email">
        </div>
        
        <div class="form-group" style="margin-bottom: 30px;">
            <label for="password"><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="password" name="password" required placeholder="Create a password">
        </div>
        
        <button type="submit" class="button btn-green" style="width: 100%; margin: 0;"><i class="fas fa-check-circle"></i> Create Account</button>
    </form>
    
    <p class="small-text" style="margin-top: 25px;">
        Already have an account? <a href="{{ url_for('login') }}" class="auth-link">Log In Here</a>
    </p>
</div>
{% endblock %}
