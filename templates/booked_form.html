{% extends 'base.html' %}
{% block title %}Bulk Booking - EventQR{% endblock %}
{% block body_class %}booked-bg{% endblock %}

{% block content %}
<div class="container auth-container">
    <h1 style="margin-bottom: 5px;"><i class="fas fa-users"></i> Bulk Booking</h1>
    <p style="margin-bottom: 25px;">Reserve multiple consecutive seats.</p>

    <form method="POST" style="width: 100%;">
        <div class="form-group">
            <label>Table Number</label>
            <input type="text" name="table_number" required placeholder="e.g. VIP-1" value="{{ table_number|default('') }}">
        </div>
        
        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label>Total Seats Needed</label>
                <input type="number" name="num_seats" required min="1" placeholder="e.g. 10" value="{{ num_seats|default('') }}">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Starting Seat #</label>
                <input type="number" name="starting_seat" required min="1" placeholder="e.g. 1" value="{{ starting_seat|default('') }}">
            </div>
        </div>
        
        <button type="submit" class="button btn-green" style="width: 100%; margin: 20px 0 10px 0;"><i class="fas fa-file-archive"></i> Generate ZIP File</button>
    </form>
    
    <a href="{{ url_for('generate_choice') }}" class="small-text auth-link" style="display:block; margin-top: 20px;"><i class="fas fa-arrow-left"></i> Back to Bookings</a>
</div>
{% endblock %}
