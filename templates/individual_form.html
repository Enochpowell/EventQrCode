{% extends "base.html" %}

{% block title %}Individual QR Details{% endblock %}

{% block body_class %}individual-bg{% endblock %}

{% block content %}
<div class="container">
    <h1>Enter Individual Details</h1>
    <form method="POST" id="individual-form">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required value="{{ request.form.name if request.method == 'POST' else '' }}">
        </div>
        <div class="form-group">
            <label for="phone">Phone Number (Optional):</label>
            <input type="text" id="phone" name="phone" value="{{ request.form.phone if request.method == 'POST' else '' }}">
        </div>
        <div class="form-group">
            <label for="table_number">Table Number:</label>
            <input type="text" id="table_number" name="table_number" required placeholder="e.g., Table A" value="{{ request.form.table_number if request.method == 'POST' else '' }}">
        </div>
        <div class="form-group">
            <label for="seat_number">Seat Number:</label>
            <input type="number" id="seat_number" name="seat_number" min="1" required value="{{ request.form.seat_number if request.method == 'POST' else 1 }}">
        </div>
        
        {# Reactive seat status message #}
        <div id="seat-status" class="seat-status"></div>

        <button type="submit">Generate QR Code</button>
    </form>
</div>
{% endblock %}
