{% extends 'base.html' %}
{% block title %}Single Booking - EventQR{% endblock %}
{% block body_class %}individual-bg{% endblock %}

{% block content %}
<div class="container auth-container">
    <h1 style="margin-bottom: 5px;"><i class="fas fa-user"></i> Single Booking</h1>
    <p style="margin-bottom: 25px;">Reserve a specific table and seat.</p>

    <form method="POST" id="individual-form" style="width: 100%;">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required placeholder="Attendee Name" value="{{ name|default('') }}">
        </div>
        
        <div class="form-group">
            <label>Phone Number (Optional)</label>
            <input type="text" name="phone" placeholder="e.g. +1 234 567 890" value="{{ phone|default('') }}">
        </div>
        
        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label>Table Number</label>
                <input type="text" id="table_number" name="table_number" required placeholder="e.g. A1" value="{{ table_number|default('') }}">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Seat Number</label>
                <input type="number" id="seat_number" name="seat_number" required min="1" placeholder="e.g. 5" value="{{ seat_number|default('') }}">
            </div>
        </div>
        
        <!-- Live status check div from your JS -->
        <div id="seat-status" class="seat-status"></div>
        
        <button type="submit" class="button" style="width: 100%; margin: 10px 0;"><i class="fas fa-qrcode"></i> Generate QR Code</button>
    </form>
    
    <a href="{{ url_for('generate_choice') }}" class="small-text auth-link" style="display:block; margin-top: 20px;"><i class="fas fa-arrow-left"></i> Back to Bookings</a>
</div>
{% endblock %}
