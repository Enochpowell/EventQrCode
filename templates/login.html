{% extends 'base.html' %}
{% block title %}Log In - EventQR{% endblock %}
{% block body_class %}default-bg{% endblock %}

{% block content %}
<div class="container auth-container">
    <div class="splash-logo" style="margin: 0 auto 20px auto; width: 70px; height: 70px; font-size: 2em; box-shadow: 0 0 15px rgba(255, 65, 54, 0.4);">
        <i class="fas fa-qrcode"></i>
    </div>
    
    <h1 style="margin-bottom: 5px;">Welcome Back</h1>
    <p style="margin-bottom: 25px;">Please log in to manage your bookings.</p>
    
    <form method="POST" action="{{ url_for('login') }}" style="width: 100%;">
        <div class="form-group">
            <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email">
        </div>
        
        <div class="form-group" style="margin-bottom: 30px;">
            <label for="password"><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password">
        </div>
        
        <button type="submit" class="button" style="width: 100%; margin: 0;"><i class="fas fa-sign-in-alt"></i> Log In</button>
    </form>
    
    <p class="small-text" style="margin-top: 25px;">
        Don't have an account? <a href="{{ url_for('signup') }}" class="auth-link">Sign Up Here</a>
    </p>
</div>
{% endblock %}
