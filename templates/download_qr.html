{% extends "base.html" %}

{% block title %}Your QR Code{% endblock %}

{% block body_class %}download-bg{% endblock %}

{% block content %}
<div class="container">
    <h1>Your QR Code is Ready!</h1>
    <img src="{{ qr_image_url }}" alt="Generated QR Code" class="qr-code-display">
    <p>Right-click (or long-press on mobile) the image above to save it.</p>
    <a href="{{ url_for('index') }}" class="button">Go Back to Home</a>
</div>
{% endblock %}
